name: SQLite Vendor Integrity

on:
  pull_request:
    paths:
      - ".github/workflows/sqlite-vendor-integrity.yml"
      - ".vscode/settings.json"
      - ".vscode/tasks.json"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "sqlite/**"
      - "test/CMakeLists.txt"
      - "test/sqlite_vendor_contract.cpp"
      - "tools/sqlite/**"
      - "test/analysis/test_sqlite*.py"
      - "test/analysis/test_sqlite_phase4_vendor_target_repo.py"
  push:
    paths:
      - ".github/workflows/sqlite-vendor-integrity.yml"
      - ".vscode/settings.json"
      - ".vscode/tasks.json"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "sqlite/**"
      - "test/CMakeLists.txt"
      - "test/sqlite_vendor_contract.cpp"
      - "tools/sqlite/**"
      - "test/analysis/test_sqlite*.py"
      - "test/analysis/test_sqlite_phase4_vendor_target_repo.py"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sqlite-vendor-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sqlite-vendor-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify manifest and generated files
        run: python3 tools/sqlite/audit_vendor.py --check-integrity

      - name: Run SQLite vendor analysis tests
        run: python3 -m unittest discover -s test/analysis -p 'test_sqlite*.py'

      - name: Run current target baseline contract
        run: python3 -m unittest discover -s test/analysis -p 'test_sqlite_phase4_vendor_target_repo.py'

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-sqlite-integrity-${{ runner.os }}-${{ hashFiles('.github/workflows/sqlite-vendor-integrity.yml') }}-v1

      - name: Install native build prerequisite
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y gperf cmake libssl-dev ninja-build lld ccache zlib1g-dev

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-sqlite-integrity-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-sqlite-integrity-${{ runner.os }}-

      - name: Configure native DB smoke build
        env:
          CCACHE_DIR: ~/.cache/ccache
          CCACHE_COMPRESS: "1"
          CCACHE_MAXSIZE: 200M
        run: cmake -S . -B build -G Ninja -DBUILD_SHARED_LIBS=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DTD_ENABLE_BENCHMARKS=OFF -DTD_ENABLE_LLD=ON

      - name: Build native DB smoke target
        env:
          CCACHE_DIR: ~/.cache/ccache
        run: cmake --build build --target run_all_tests --parallel $(nproc)

      - name: Refresh exact CTest discovery
        run: cmake -S . -B build -G Ninja -DBUILD_SHARED_LIBS=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DTD_ENABLE_BENCHMARKS=OFF -DTD_ENABLE_LLD=ON

      - name: Run native SQLite DB smoke
        run: ctest --test-dir build/test --output-on-failure -R '^Test_DB_sqlite_vendor_wrapper_surface_contract$'